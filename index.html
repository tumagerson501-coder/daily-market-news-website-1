<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Daily Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <header>
        <div class="container">
            <h1>Daily News Hub</h1>
            <p>Latest Daily Updates Around the World</p>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Trending</a></li>
            <li><a href="#">Technology</a></li>
            <li><a href="#">Sports</a></li>
            <li><a href="#">Entertainment</a></li>
        </ul>
    </nav>

    <main class="container">

        <section class="hero">
            <h2>Top Breaking News</h2>
            <p>Stay updated with the latest headlines every day.</p>
        </section>

        <section id="news-container" class="news-grid">
            <!-- News will load here from data.js -->
        </section>

        <!-- CUSDIS COMMENT SECTION -->
        <section class="comment-section">
            <h2>Community Reviews & Comments</h2>
            <p>Share your thoughts and discuss today's news.</p>

            
            <!-- Upgraded Cusdis thread container -->
<div id="cusdis_thread"
  data-host="https://cusdis.com"
  data-app-id="eb56e38a-ca2e-4aca-a9c5-ce0d6c0a13b1"
  data-page-id="{{ PAGE_ID }}"
  data-page-url="{{ PAGE_URL }}"
  data-page-title="{{ PAGE_TITLE }}"
></div>
<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

        </section>
        
            <script>
document.addEventListener("DOMContentLoaded", () => {
    const cusdisThread = document.getElementById('cusdis_thread');
    
    if (cusdisThread) {
        // Automatically isolate dynamic path configurations 
        cusdisThread.setAttribute('data-page-id', window.location.pathname);
        cusdisThread.setAttribute('data-page-url', window.location.href);
        cusdisThread.setAttribute('data-page-title', document.title);
    }
});
                </script>
    </main>
    <script src="data.js"></script>
    <script src="app.js"></script>

     
</body>
</html>
